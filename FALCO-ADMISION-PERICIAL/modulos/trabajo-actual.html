<!-- =========================================================
     TRABAJO ACTUAL
========================================================= -->

<section class="submodulo">

    <div class="submodulo__cabecera">

        <div class="submodulo__numero">
            09
        </div>

        <div>

            <h3>Trabajo Actual</h3>

            <p>

                Complete la información correspondiente a su situación laboral
                actual.

            </p>

        </div>

    </div>

</section>



<!-- =========================================================
     SITUACIÓN LABORAL ACTUAL
========================================================= -->

<section class="submodulo">

<h3>Situación laboral</h3>

<div class="form-grid">

<div class="campo">

<label>

¿Actualmente trabaja? *

</label>

<select
id="trabajaActualmente"
required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

<option>Licencia médica</option>

<option>Despedido</option>

<option>Jubilado</option>

<option>Pensionado</option>

</select>

</div>

<div class="campo">

<label>

Fecha de ingreso *

</label>

<input
type="date"
id="fechaIngresoActual"
required>

</div>

</div>

</section>



<!-- =========================================================
     EMPLEO ACTUAL
========================================================= -->

<section
class="submodulo"
id="datosTrabajoActual">

<h3>Datos del empleo</h3>

<div class="form-grid">

<div class="campo full">

<label>

Empresa o empleador *

</label>

<input
type="text"
required>

</div>

<div class="campo">

<label>

Actividad de la empresa *

</label>

<input
type="text"
required>

</div>

<div class="campo">

<label>

Cargo / Puesto *

</label>

<input
type="text"
required>

</div>

<div class="campo">

<label>

Horario habitual *

</label>

<input
type="text"
required>

</div>

<div class="campo">

<label>

Cantidad de horas diarias *

</label>

<input
type="number"
required>

</div>

<div class="campo">

<label>

Días por semana *

</label>

<input
type="number"
min="1"
max="7"
required>

</div>

<div class="campo">

<label>

Tipo de relación laboral *

</label>

<select required>

<option value=""></option>

<option>Relación de dependencia</option>

<option>Monotributista</option>

<option>Autónomo</option>

<option>Contratado</option>

<option>Otro</option>

</select>

</div>

<div class="campo">

<label>

¿Personal a cargo? *

</label>

<select required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo">

<label>

¿Realiza esfuerzo físico? *

</label>

<select required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

<option>Ocasionalmente</option>

</select>

</div>

<div class="campo">

<label>

¿Conduce vehículos laborales? *

</label>

<select required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo full">

<label>

Describa detalladamente las tareas que realiza *

</label>

<textarea
rows="8"
required></textarea>

</div>

</div>

</section>
