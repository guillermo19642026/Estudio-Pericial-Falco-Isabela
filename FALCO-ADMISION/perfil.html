<body class="admision-page admision-page--profile">

  <main class="admision-profile">

    <section
      class="admision-profile__card"
      aria-labelledby="profileTitle"
    >

      <header class="admision-profile__header">

        <a
          href="index.html"
          class="admision-profile__back"
          aria-label="Volver al inicio"
        >
          ← Volver
        </a>

        <p class="admision-eyebrow">
          FALCO Admisión™
        </p>

        <h1 id="profileTitle">
          Antes de comenzar
        </h1>

        <p>
          Necesitamos saber quién realiza la consulta para mostrar el recorrido adecuado.
        </p>

      </header>

      <form
        id="profileForm"
        class="admision-profile__form"
        novalidate
      >

        <fieldset class="admision-profile__fieldset">

          <legend>
            ¿Cómo podemos ayudarte hoy?
          </legend>

          <div class="admision-profile__options">

            <label class="admision-profile-option">

              <input
                type="radio"
                name="profileType"
                value="persona"
              >

              <span class="admision-profile-option__control">

                <span
                  class="admision-profile-option__indicator"
                  aria-hidden="true"
                ></span>

                <span class="admision-profile-option__icon">
                  01
                </span>

                <span class="admision-profile-option__content">

                  <strong>
                    Soy una persona
                  </strong>

                  <span>
                    Quiero realizar una consulta sobre una situación personal, familiar, judicial o pericial.
                  </span>

                </span>

              </span>

            </label>

            <label class="admision-profile-option">

              <input
                type="radio"
                name="profileType"
                value="profesional"
              >

              <span class="admision-profile-option__control">

                <span
                  class="admision-profile-option__indicator"
                  aria-hidden="true"
                ></span>

                <span class="admision-profile-option__icon">
                  02
                </span>

                <span class="admision-profile-option__content">

                  <strong>
                    Soy profesional
                  </strong>

                  <span>
                    Necesito supervisión, asesoramiento, revisión técnica o asistencia vinculada con una causa.
                  </span>

                </span>

              </span>

            </label>

          </div>

        </fieldset>

        <div
          id="profileValidation"
          class="admision-question__validation"
          role="alert"
          hidden
        >

          <span
            class="admision-question__validation-icon"
            aria-hidden="true"
          >
            !
          </span>

          <p>
            Seleccioná una opción para continuar.
          </p>

        </div>

        <div class="admision-profile__actions">

          <button
            type="submit"
            id="continueProfileButton"
            class="admision-button admision-button--primary"
          >
            Continuar
          </button>

        </div>

      </form>

      <p class="admision-profile__privacy">
        La selección solo define las preguntas que se mostrarán durante la admisión.
      </p>

    </section>

   

  </main>

  <div
    id="profileLiveRegion"
    class="admision-visually-hidden"
    aria-live="polite"
    aria-atomic="true"
  ></div>
