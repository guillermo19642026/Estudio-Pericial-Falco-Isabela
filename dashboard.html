<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel de Evaluaciones</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="tests-home">

<header class="tests-header">
  <div class="tests-logo">
    <img src="img/logo.png" alt="Estudio Pericial Psicológico">
  </div>

  <div class="tests-brand">
    ESTUDIO PERICIAL PSICOLÓGICO
    <span>Lic. en Psicología Isabela Falco</span>
  </div>

  <button class="tests-logout" onclick="logout()">Cerrar sesión</button>
</header>

<section class="tests-hero">
  <h1>Evaluaciones Psicológicas</h1>
  <p>Seleccione el instrumento que desea administrar</p>
</section>

<main class="tests-main">

  <button class="tests-card" onclick="ir('scl90.html')">
    <span>SCL-90 / BSI</span>
    <small>Evaluación psicopatológica general</small>
    <b>Iniciar evaluación</b>
  </button>

  <button class="tests-card" onclick="ir('bdi.html')">
    <span>Depresión BDI</span>
    <small>Inventario de Depresión de Beck</small>
    <b>Iniciar evaluación</b>
  </button>

  <button class="tests-card" onclick="ir('bai.html')">
    <span>Ansiedad BAI</span>
    <small>Inventario de Ansiedad de Beck</small>
    <b>Iniciar evaluación</b>
  </button>

  <button class="tests-card" onclick="ir('desesperanza.html')">
    <span>Desesperanza</span>
    <small>Escala de Desesperanza de Beck</small>
    <b>Iniciar evaluación</b>
  </button>

</main>

<script type="module" src="auth.js"></script>

<script>
function ir(pagina) {
  window.location.href = pagina;
}
</script>

</body>
</html>
