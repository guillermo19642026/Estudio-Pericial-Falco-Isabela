<!-- =========================================================
     ÁREA AFECTIVA
========================================================= -->

<section class="submodulo">

    <div class="submodulo__cabecera">

        <div class="submodulo__numero">
            05
        </div>

        <div>

            <h3>Área Afectiva</h3>

            <p>

                La siguiente información permitirá conocer su situación afectiva
                antes y después del hecho motivo de esta evaluación.

            </p>

        </div>

    </div>

</section>



<!-- =========================================================
     ESTADO CIVIL
========================================================= -->

<section class="submodulo">

<h3>Situación afectiva</h3>

<div class="form-grid">

<div class="campo">

<label>

Estado civil *

</label>

<select
id="estadoCivil"
required>

<option value=""></option>

<option>Soltero/a</option>

<option>En pareja</option>

<option>Conviviente</option>

<option>Casado/a</option>

<option>Separado/a</option>

<option>Divorciado/a</option>

<option>Viudo/a</option>

</select>

</div>

<div class="campo">

<label>

¿Actualmente tiene pareja? *

</label>

<select
id="tienePareja"
required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

</div>

</section>



<!-- =========================================================
     DATOS DE LA PAREJA
========================================================= -->

<section
class="submodulo"
id="datosPareja">

<h3>Datos de la pareja</h3>

<div class="form-grid">

<div class="campo">

<label>

Nombre

</label>

<input
type="text"
id="nombrePareja">

</div>

<div class="campo">

<label>

Edad

</label>

<input
type="number"
id="edadPareja">

</div>

<div class="campo">

<label>

Ocupación

</label>

<input
type="text"
id="ocupacionPareja">

</div>

<div class="campo">

<label>

Tiempo de relación

</label>

<input
type="text"
id="tiempoRelacion">

</div>

<div class="campo">

<label>

¿Conviven?

</label>

<select
id="conviven">

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo">

<label>

¿Tienen hijos en común?

</label>

<select
id="hijosComun">

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

</div>

</section>



<!-- =========================================================
     RELACIÓN DE PAREJA
========================================================= -->

<section class="submodulo">

<h3>Relación de pareja</h3>

<div class="form-grid">

<div class="campo">

<label>

¿Cómo considera la relación? *

</label>

<select required>

<option value=""></option>

<option>Muy buena</option>

<option>Buena</option>

<option>Regular</option>

<option>Mala</option>

<option>Muy mala</option>

<option>Conflictiva</option>

</select>

</div>

<div class="campo">

<label>

Frecuencia de convivencia o contacto *

</label>

<select required>

<option value=""></option>

<option>Diaria</option>

<option>Varias veces por semana</option>

<option>Semanal</option>

<option>Esporádica</option>

</select>

</div>

<div class="campo full">

<label>

Describa la relación con su pareja *

</label>

<textarea
rows="6"
required></textarea>

</div>

</div>

</section>



<!-- =========================================================
     APOYO EMOCIONAL
========================================================= -->

<section class="submodulo">

<h3>Apoyo emocional</h3>

<div class="form-grid">

<div class="campo">

<label>

¿Cuenta con apoyo emocional? *

</label>

<select
required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo">

<label>

¿De quién recibe mayor apoyo? *

</label>

<select
required>

<option value=""></option>

<option>Pareja</option>

<option>Padres</option>

<option>Hijos</option>

<option>Hermanos</option>

<option>Amigos</option>

<option>Otro familiar</option>

<option>Nadie</option>

</select>

</div>

<div class="campo full">

<label>

Explique cómo es ese apoyo *

</label>

<textarea
rows="6"
required></textarea>

</div>

</div>

</section>



<!-- =========================================================
     CAMBIOS POSTERIORES
========================================================= -->

<section class="submodulo">

<h3>Cambios posteriores al hecho</h3>

<div class="form-grid">

<div class="campo">

<label>

¿El hecho modificó su relación de pareja? *

</label>

<select
required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo">

<label>

¿El hecho modificó su vida afectiva? *

</label>

<select
required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo full">

<label>

Describa los cambios producidos *

</label>

<textarea
rows="8"
required></textarea>

</div>

<div class="campo full">

<label>

¿Cómo considera actualmente su situación afectiva? *

</label>

<textarea
rows="8"
required></textarea>

</div>

</div>

</section>



<!-- =========================================================
     OBSERVACIONES
========================================================= -->

<section class="submodulo">

<h3>Observaciones</h3>

<div class="form-grid">

<div class="campo full">

<label>

¿Desea agregar alguna información relacionada con su vida afectiva que considere importante para esta evaluación? *

</label>

<textarea
rows="8"
required></textarea>

</div>

</div>

</section>
