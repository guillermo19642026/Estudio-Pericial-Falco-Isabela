<!-- =========================================================
     MÓDULO 01
     DATOS PERSONALES
     Sistema de Admisión Pericial FALCO®
========================================================= -->

<section class="modulo">

  <header class="modulo-header">

    <span class="modulo-kicker">
      Módulo 1 de 12
    </span>

    <h1>
      Datos Personales
    </h1>

    <p>
      Complete la siguiente información personal.
      Los campos marcados con (*) son obligatorios.
    </p>

  </header>


  <!-- ===================================================== -->
  <!-- IDENTIFICACIÓN                                        -->
  <!-- ===================================================== -->

  <section class="card">

    <h2>Identificación</h2>

    <div class="grid">

      <div class="campo full">

        <label for="nombre">
          Nombre y apellido *
        </label>

        <input
          id="nombre"
          name="nombre"
          type="text"
          autocomplete="name"
          required>

      </div>


      <div class="campo">

        <label for="dni">
          DNI *
        </label>

        <input
          id="dni"
          name="dni"
          type="text"
          inputmode="numeric"
          maxlength="10"
          required>

      </div>


      <div class="campo">

        <label for="cuil">
          CUIL / CUIT *
        </label>

        <input
          id="cuil"
          name="cuil"
          type="text"
          maxlength="13"
          required>

      </div>


      <div class="campo">

        <label for="fechaNacimiento">
          Fecha de nacimiento *
        </label>

        <input
          id="fechaNacimiento"
          name="fechaNacimiento"
          type="date"
          required>

      </div>


      <div class="campo">

        <label for="edad">
          Edad *
        </label>

        <input
          id="edad"
          name="edad"
          type="number"
          readonly
          required>

      </div>


      <div class="campo">

        <label for="lugarNacimiento">
          Lugar de nacimiento *
        </label>

        <input
          id="lugarNacimiento"
          name="lugarNacimiento"
          type="text"
          required>

      </div>


      <div class="campo">

        <label for="nacionalidad">
          Nacionalidad *
        </label>

        <input
          id="nacionalidad"
          name="nacionalidad"
          type="text"
          required>

      </div>


      <div class="campo">

        <label for="estadoCivil">
          Estado civil *
        </label>

        <select
          id="estadoCivil"
          name="estadoCivil"
          required>

          <option value="">
            Seleccione...
          </option>

          <option>
            Soltero/a
          </option>

          <option>
            Casado/a
          </option>

          <option>
            Conviviente
          </option>

          <option>
            Separado/a
          </option>

          <option>
            Divorciado/a
          </option>

          <option>
            Viudo/a
          </option>

        </select>

      </div>


      <div class="campo">

        <label for="ocupacion">
          Ocupación actual *
        </label>

        <input
          id="ocupacion"
          name="ocupacion"
          type="text"
          required>

      </div>


      <div class="campo">

        <label for="idioma">
          Idioma principal *
        </label>

        <select
          id="idioma"
          name="idioma"
          required>

          <option value="">
            Seleccione...
          </option>

          <option>
            Español
          </option>

          <option>
            Portugués
          </option>

          <option>
            Inglés
          </option>

          <option>
            Otro
          </option>

        </select>

      </div>


      <div class="campo">

        <label for="comprensionIdioma">
          Comprensión del español *
        </label>

        <select
          id="comprensionIdioma"
          name="comprensionIdioma"
          required>

          <option value="">
            Seleccione...
          </option>

          <option>
            Excelente
          </option>

          <option>
            Buena
          </option>

          <option>
            Regular
          </option>

          <option>
            Básica
          </option>

        </select>

      </div>


      <div class="campo">

        <label for="leerEscribir">
          ¿Sabe leer y escribir? *
        </label>

        <select
          id="leerEscribir"
          name="leerEscribir"
          required>

          <option value="">
            Seleccione...
          </option>

          <option>
            Sí
          </option>

          <option>
            No
          </option>

        </select>

      </div>

    </div>

  </section>



  <!-- ===================================================== -->
  <!-- DOMICILIO                                             -->
  <!-- ===================================================== -->

  <section class="card">

    <h2>Domicilio</h2>

    <div class="grid">

      <div class="campo full">

        <label for="domicilio">
          Domicilio *
        </label>

        <input
          id="domicilio"
          name="domicilio"
          type="text"
          required>

      </div>


      <div class="campo">

        <label for="localidad">
          Localidad *
        </label>

        <input
          id="localidad"
          name="localidad"
          type="text"
          required>

      </div>


      <div class="campo">

        <label for="partido">
          Partido
        </label>

        <input
          id="partido"
          name="partido"
          type="text">

      </div>


      <div class="campo">

        <label for="provincia">
          Provincia *
        </label>

        <input
          id="provincia"
          name="provincia"
          type="text"
          required>

      </div>


      <div class="campo">

        <label for="codigoPostal">
          Código Postal
        </label>

        <input
          id="codigoPostal"
          name="codigoPostal"
          type="text">

      </div>


      <div class="campo full">

        <label for="desdeCuandoDomicilio">
          ¿Desde cuándo vive en ese domicilio? *
        </label>

        <input
          id="desdeCuandoDomicilio"
          name="desdeCuandoDomicilio"
          type="text"
          required>

      </div>

    </div>

  </section>



  <!-- ===================================================== -->
  <!-- CONTACTO                                              -->
  <!-- ===================================================== -->

  <section class="card">

    <h2>Contacto</h2>

    <div class="grid">

      <div class="campo">

        <label for="telefono">
          Celular *
        </label>

        <input
          id="telefono"
          name="telefono"
          type="tel"
          required>

      </div>


      <div class="campo">

        <label for="telefonoAlternativo">
          Teléfono alternativo
        </label>

        <input
          id="telefonoAlternativo"
          name="telefonoAlternativo"
          type="tel">

      </div>


      <div class="campo full">

        <label for="email">
          Correo electrónico *
        </label>

        <input
          id="email"
          name="email"
          type="email"
          required>

      </div>


      <div class="campo">

        <label for="medioContacto">
          Medio de contacto preferido *
        </label>

        <select
          id="medioContacto"
          name="medioContacto"
          required>

          <option value="">
            Seleccione...
          </option>

          <option>
            WhatsApp
          </option>

          <option>
            Llamada
          </option>

          <option>
            Correo electrónico
          </option>

        </select>

      </div>


      <div class="campo">

        <label for="horarioContacto">
          Horario preferido *
        </label>

        <input
          id="horarioContacto"
          name="horarioContacto"
          type="text"
          required>

      </div>

    </div>

  </section>



  <!-- ===================================================== -->
  <!-- PERSONA DE REFERENCIA                                 -->
  <!-- ===================================================== -->

  <section class="card">

    <h2>Persona de referencia</h2>

    <div class="grid">

      <div class="campo">

        <label for="referenciaNombre">
          Nombre
        </label>

        <input
          id="referenciaNombre"
          name="referenciaNombre"
          type="text">

      </div>


      <div class="campo">

        <label for="referenciaRelacion">
          Relación
        </label>

        <input
          id="referenciaRelacion"
          name="referenciaRelacion"
          type="text">

      </div>


      <div class="campo">

        <label for="referenciaTelefono">
          Teléfono
        </label>

        <input
          id="referenciaTelefono"
          name="referenciaTelefono"
          type="tel">

      </div>


      <div class="campo full">

        <label for="referenciaObservaciones">
          Observaciones
        </label>

        <textarea
          id="referenciaObservaciones"
          name="referenciaObservaciones"
          rows="3"></textarea>

      </div>

    </div>

  </section>



  <!-- ===================================================== -->
  <!-- DOCUMENTACIÓN                                         -->
  <!-- ===================================================== -->

  <section class="card">

    <h2>Documentación identificatoria</h2>

    <div class="grid">

      <div class="campo full">

        <label for="dniFrente">
          DNI - Frente *
        </label>

        <input
          id="dniFrente"
          name="dniFrente"
          type="file"
          accept="image/*,.pdf"
          required>

      </div>


      <div class="campo full">

        <label for="dniDorso">
          DNI - Dorso *
        </label>

        <input
          id="dniDorso"
          name="dniDorso"
          type="file"
          accept="image/*,.pdf"
          required>

      </div>


      <div class="campo">

        <label for="poseeCud">
          ¿Posee CUD? *
        </label>

        <select
          id="poseeCud"
          name="poseeCud"
          required>

          <option value="">
            Seleccione...
          </option>

          <option>
            Sí
          </option>

          <option>
            No
          </option>

        </select>

      </div>


      <div
        class="campo full"
        id="contenedorCud"
        style="display:none;">

        <label for="archivoCud">
          Adjuntar Certificado Único de Discapacidad
        </label>

        <input
          id="archivoCud"
          name="archivoCud"
          type="file"
          accept="image/*,.pdf">

      </div>

    </div>

  </section>



  <!-- ===================================================== -->
  <!-- ACCESIBILIDAD                                         -->
  <!-- ===================================================== -->

  <section class="card">

    <h2>Accesibilidad</h2>

    <div class="grid">

      <div class="campo">

        <label for="anteojos">
          ¿Utiliza anteojos? *
        </label>

        <select
          id="anteojos"
          required>

          <option value=""></option>

          <option>Sí</option>

          <option>No</option>

        </select>

      </div>


      <div class="campo">

        <label for="audifonos">
          ¿Utiliza audífonos? *
        </label>

        <select
          id="audifonos"
          required>

          <option value=""></option>

          <option>Sí</option>

          <option>No</option>

        </select>

      </div>


      <div class="campo full">

        <label for="adaptacion">

¿Necesita alguna adaptación para realizar la entrevista? *

        </label>

        <textarea
          id="adaptacion"
          rows="3"
          required></textarea>

      </div>

    </div>

  </section>



  <!-- ===================================================== -->
  <!-- OBSERVACIONES                                         -->
  <!-- ===================================================== -->

  <section class="card">

    <h2>Observaciones</h2>

    <textarea
      id="observacionesPersonales"
      rows="5"></textarea>

  </section>

</section>
