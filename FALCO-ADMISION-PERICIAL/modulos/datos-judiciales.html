<!-- =========================================================
     DATOS JUDICIALES
========================================================= -->

<section class="submodulo">

    <div class="submodulo__cabecera">

        <div class="submodulo__numero">
            01
        </div>

        <div>

            <h3>Información Judicial</h3>

            <p>

                Complete los datos de la causa judicial. Salvo el nombre y teléfono
                del abogado, el resto de la información es opcional.

            </p>

        </div>

    </div>



    <div class="form-grid">

        <div class="campo full">

            <label>

                Nombre y apellido del abogado patrocinante *

            </label>

            <input
                type="text"
                id="nombreAbogado"
                required>

        </div>



        <div class="campo">

            <label>

                Teléfono del abogado *

            </label>

            <input
                type="tel"
                id="telefonoAbogado"
                required>

        </div>



        <div class="campo">

            <label>

                Correo electrónico del abogado

            </label>

            <input
                type="email"
                id="emailAbogado">

        </div>



        <div class="campo">

            <label>

                Fuero

            </label>

            <select id="fuero">

                <option value=""></option>

                <option>Laboral</option>

                <option>Civil</option>

                <option>Familia</option>

                <option>Penal</option>

                <option>Comercial</option>

                <option>Contencioso Administrativo</option>

                <option>Otro</option>

            </select>

        </div>



        <div class="campo">

            <label>

                Departamento Judicial

            </label>

            <input
                type="text"
                id="departamentoJudicial">

        </div>



        <div class="campo">

            <label>

                Tribunal / Juzgado

            </label>

            <input
                type="text"
                id="tribunal">

        </div>



        <div class="campo">

            <label>

                Secretaría

            </label>

            <input
                type="text"
                id="secretaria">

        </div>



        <div class="campo">

            <label>

                Número de expediente

            </label>

            <input
                type="text"
                id="expediente">

        </div>



        <div class="campo full">

            <label>

                Carátula de la causa

            </label>

            <input
                type="text"
                id="caratula">

        </div>



        <div class="campo">

            <label>

                Actor

            </label>

            <input
                type="text"
                id="actor">

        </div>



        <div class="campo">

            <label>

                Demandado

            </label>

            <input
                type="text"
                id="demandado">

        </div>



        <div class="campo">

            <label>

                ART / Compañía de Seguros

            </label>

            <input
                type="text"
                id="artSeguro">

        </div>



        <div class="campo">

            <label>

                Tipo de reclamo

            </label>

            <select id="tipoReclamo">

                <option value=""></option>

                <option>Accidente de Trabajo</option>

                <option>Enfermedad Profesional</option>

                <option>Daños y Perjuicios</option>

                <option>Accidente de Tránsito</option>

                <option>Responsabilidad Civil</option>

                <option>Otro</option>

            </select>

        </div>



        <div class="campo">

            <label>

                Fecha del hecho

            </label>

            <input
                type="date"
                id="fechaHechoJudicial">

        </div>



        <div class="campo">

            <label>

                Fecha de inicio de la causa

            </label>

            <input
                type="date"
                id="fechaInicioCausa">

        </div>



        <div class="campo">

            <label>

                Fecha de la evaluación pericial

            </label>

            <input
                type="date"
                id="fechaPericia">

        </div>



        <div class="campo full">

            <label>

                Observaciones

            </label>

            <textarea
                id="observacionesJudiciales"
                rows="5"
                placeholder="Si desea agregar alguna información relevante sobre la causa judicial puede hacerlo aquí."></textarea>

        </div>

    </div>

</section>
