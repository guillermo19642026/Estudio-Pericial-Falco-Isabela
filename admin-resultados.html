<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de resultados</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="admin-header">
  <h1>Panel de resultados</h1>
  <div>
    <button onclick="window.location.href='dashboard.html'">Volver</button>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<main class="admin-panel">

  <section class="card">
    <h2>Evaluaciones guardadas</h2>
    <p class="note">Resultados almacenados en Firebase.</p>

    <div id="estadoCargaAdmin">Cargando resultados...</div>

    <table>
      <thead>
        <tr>
          <th>Fecha</th>
          <th>Paciente</th>
          <th>Test</th>
          <th>Puntaje</th>
          <th>Nivel</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tablaResultadosAdmin"></tbody>
    </table>
  </section>

  <section class="card" id="detalleResultado" style="display:none;">
    <h2>Detalle de evaluación</h2>
    <div id="detalleContenido"></div>
  </section>

</main>

<script type="module" src="auth.js"></script>
<script type="module" src="script-admin-resultados.js"></script>

</body>
</html>
