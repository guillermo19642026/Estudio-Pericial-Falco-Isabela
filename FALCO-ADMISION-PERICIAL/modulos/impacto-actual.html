<!-- =========================================================
     IMPACTO ACTUAL
========================================================= -->

<section class="card">

    <h2>Impacto actual</h2>

    <p class="descripcion">
        Describa cómo se encuentra actualmente y de qué manera el hecho ha afectado los distintos aspectos de su vida.
    </p>

</section>



<!-- =========================================================
     SÍNTOMAS ACTUALES
========================================================= -->

<section class="card">

<h2>Síntomas actuales</h2>

<div class="grid">

<div class="campo">

<label>
¿Presenta actualmente síntomas relacionados con el hecho? *
</label>

<select id="sintomasActuales" required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo full">

<label>
Describa los síntomas *
</label>

<textarea
id="descripcionSintomas"
rows="6"
required
placeholder="Dolor, ansiedad, miedo, tristeza, irritabilidad, insomnio, dificultades de concentración, recuerdos del hecho, etc."></textarea>

</div>

</div>

</section>



<!-- =========================================================
     VIDA COTIDIANA
========================================================= -->

<section class="card">

<h2>Vida cotidiana</h2>

<div class="grid">

<div class="campo">

<label>
¿El hecho afectó su vida diaria? *
</label>

<select id="vidaDiaria" required>

<option value=""></option>

<option>Mucho</option>

<option>Bastante</option>

<option>Poco</option>

<option>Nada</option>

</select>

</div>

<div class="campo full">

<label>
Explique de qué manera *
</label>

<textarea
id="detalleVidaDiaria"
rows="6"
required></textarea>

</div>

</div>

</section>



<!-- =========================================================
     SUEÑO
========================================================= -->

<section class="card">

<h2>Sueño</h2>

<div class="grid">

<div class="campo">

<label>
¿Cómo duerme actualmente? *
</label>

<select id="suenoActual" required>

<option value=""></option>

<option>Muy bien</option>

<option>Bien</option>

<option>Regular</option>

<option>Mal</option>

<option>Muy mal</option>

</select>

</div>

<div class="campo">

<label>
¿Tiene pesadillas? *
</label>

<select id="pesadillas" required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo">

<label>
¿Se despierta durante la noche? *
</label>

<select id="despertares" required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo full">

<label>
Observaciones *
</label>

<textarea
id="obsSueno"
rows="5"
required></textarea>

</div>

</div>

</section>



<!-- =========================================================
     ESTADO EMOCIONAL
========================================================= -->

<section class="card">

<h2>Estado emocional</h2>

<div class="grid">

<div class="campo">

<label>
¿Cómo describiría actualmente su estado de ánimo? *
</label>

<select id="estadoAnimo" required>

<option value=""></option>

<option>Muy bueno</option>

<option>Bueno</option>

<option>Regular</option>

<option>Malo</option>

<option>Muy malo</option>

</select>

</div>

<div class="campo">

<label>
¿Se siente más irritable que antes? *
</label>

<select id="irritabilidad" required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo">

<label>
¿Llora con facilidad? *
</label>

<select id="llanto" required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo">

<label>
¿Siente temor relacionado con el hecho? *
</label>

<select id="temor" required>

<option value=""></option>

<option>Sí</option>

<option>No</option>

</select>

</div>

<div class="campo full">

<label>
Explique *
</label>

<textarea
id="detalleEstadoEmocional"
rows="6"
required></textarea>

</div>

</div>

</section>



<!-- =========================================================
     EXPECTATIVAS
========================================================= -->

<section class="card">

<h2>Situación actual y expectativas</h2>

<div class="grid">

<div class="campo full">

<label>
¿Cómo considera que se encuentra actualmente? *
</label>

<textarea
id="situacionActual"
rows="6"
required></textarea>

</div>

<div class="campo full">

<label>
¿Qué espera lograr con este proceso judicial? *
</label>

<textarea
id="expectativas"
rows="6"
required></textarea>

</div>

<div class="campo full">

<label>
¿Desea agregar alguna información que considere importante para esta evaluación? *
</label>

<textarea
id="comentariosFinales"
rows="8"
required></textarea>

</div>

</div>

</section>
