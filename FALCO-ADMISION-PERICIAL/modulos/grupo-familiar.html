<!-- =========================================================
     GRUPO FAMILIAR
========================================================= -->

<section class="submodulo">

  <div class="submodulo__cabecera">

    <div class="submodulo__numero">
      04
    </div>

    <div>
      <h3>Grupo Familiar</h3>

      <p>
        Complete la composición de su familia y describa cómo es actualmente
        el vínculo con cada integrante.
      </p>
    </div>

  </div>

</section>


<!-- =========================================================
     PADRE
========================================================= -->

<section class="submodulo">

  <h3>Padre</h3>

  <div class="form-grid">

    <div class="campo full">

      <label for="nombrePadre">
        Nombre y apellido del padre *
      </label>

      <input
        id="nombrePadre"
        name="nombrePadre"
        type="text"
        required>

    </div>


    <div class="campo">

      <label for="padreVive">
        ¿Vive actualmente? *
      </label>

      <select
        id="padreVive"
        name="padreVive"
        required>

        <option value="">Seleccione...</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
        <option value="No sabe">No sabe</option>

      </select>

    </div>


    <div class="campo">

      <label for="edadPadre">
        Edad o edad al fallecer *
      </label>

      <input
        id="edadPadre"
        name="edadPadre"
        type="number"
        min="0"
        max="120"
        required>

    </div>


    <div class="campo">

      <label for="ocupacionPadre">
        Profesión u ocupación *
      </label>

      <input
        id="ocupacionPadre"
        name="ocupacionPadre"
        type="text"
        required>

    </div>


    <div class="campo">

      <label for="convivePadre">
        ¿Convive con usted? *
      </label>

      <select
        id="convivePadre"
        name="convivePadre"
        required>

        <option value="">Seleccione...</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
        <option value="No corresponde">No corresponde</option>

      </select>

    </div>


    <div class="campo">

      <label for="contactoPadre">
        ¿Lo ve o mantiene contacto? *
      </label>

      <select
        id="contactoPadre"
        name="contactoPadre"
        required>

        <option value="">Seleccione...</option>
        <option value="Sí">Sí</option>
        <option value="No">No</option>
        <option value="No corresponde">No corresponde</option>

      </select>

    </div>


    <div class="campo">

      <label for="frecuenciaPadre">
        Frecuencia del contacto *
      </label>

      <select
        id="frecuenciaPadre"
        name="frecuenciaPadre"
        required>

        <option value="">Seleccione...</option>
        <option value="Diaria">Diaria</option>
        <option value="Varias veces por semana">Varias veces por semana</option>
        <option value="Semanal">Semanal</option>
        <option value="Quincenal">Quincenal</option>
        <option value="Mensual">Mensual</option>
        <option value="Esporádica">Esporádica</option>
        <option value="No mantiene contacto">No mantiene contacto</option>
        <option value="No corresponde">No corresponde</option>

      </select>

    </div>


    <div class="campo">

      <label for="relacionPadre">
        ¿Cómo es la relación? *
      </label>

      <select
        id="relacionPadre"
        name="relacionPadre"
        required>

        <option value="">Seleccione...</option>
        <option value="Muy buena">Muy buena</option>
        <option value="Buena">Buena</option>
        <option value="Regular">Regular</option>
        <option value="Mala">Mala</option>
        <option value="Muy mala">Muy mala</option>
        <option value="Conflictiva">Conflictiva</option>
        <option value="Sin relación">Sin relación</option>
        <option value="No corresponde">No corresponde</option>

      </select>

    </div>


    <div class="campo full">

      <label for="descripcionPadre">
        Describa cómo se llevan, si se ven, se hablan, se visitan, se ayudan
        o no mantienen relación *
      </label>

      <textarea
        id="descripcionPadre"
        name="descripcionPadre"
        rows="6"
        required></textarea>

    </div>

  </div>

</section>

      <textarea
