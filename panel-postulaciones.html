<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de postulaciones</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="admin-header">
  <h1>Panel de postulaciones</h1>
  <div>
    <button onclick="window.location.href='dashboard.html'">Volver</button>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<main class="admin-panel">

  <section class="card">
    <h2>Postulaciones recibidas</h2>
    <p class="note">Listado de profesionales que enviaron sus antecedentes.</p>

    <div class="admin-filtros">
      <input type="text" id="buscarPostulante" placeholder="Buscar por nombre, profesión o email...">

      <select id="filtroEstado">
        <option value="">Todos los estados</option>
        <option value="pendiente">Pendiente</option>
        <option value="contactado">Contactado</option>
        <option value="descartado">Descartado</option>
      </select>

      <button onclick="limpiarFiltrosPostulaciones()">Limpiar filtros</button>
    
      <button onclick="exportarPostulacionesCSV()">Exportar CSV</button>

      </div>

    <div id="estadoPostulaciones">Cargando postulaciones...</div>

    <div class="tabla-scroll">
      <table>
        <thead>
         <tr>
  <th>Fecha</th>
  <th>Nombre</th>
  <th>Profesión</th>
  <th>Email</th>
  <th>Teléfono</th>
  <th>Estado</th>
  <th>CV</th>
  <th>Ver</th>
  <th>Eliminar</th>
</tr>
        </thead>
        <tbody id="tablaPostulaciones"></tbody>
      </table>
    </div>
  </section>

  <section class="card" id="detallePostulacion" style="display:none;">
    <h2>Detalle de postulación</h2>
    <div id="detallePostulacionContenido"></div>
  </section>

</main>

<script type="module" src="auth.js"></script>
<script type="module" src="script-postulaciones.js"></script>

</body>
</html>
