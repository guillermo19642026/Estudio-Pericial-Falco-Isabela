<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de resultados</title>
<link rel="stylesheet" href="styles.css">
</head>

<head>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-W9RKEV2LN1"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-W9RKEV2LN1');
</script>





<body>

<header class="admin-header">
  <h1>Panel de resultados</h1>
  <div>
    <button onclick="window.location.href='dashboard.html'">Volver</button>
    <button class="logout" onclick="logout()">Cerrar sesión</button>
  </div>
</header>

<main class="admin-panel">

  <section class="card">
    <h2>Evaluaciones guardadas</h2>
    <p class="note">Buscar, filtrar y revisar resultados almacenados.</p>

    <div class="admin-filtros">
      <input type="text" id="buscarPaciente" placeholder="Buscar por paciente...">

      <select id="filtroTest">
        <option value="">Todos los tests</option>
        <option value="BDI">BDI</option>
        <option value="BAI">BAI</option>
        <option value="Desesperanza">Desesperanza</option>
        <option value="SCL">SCL</option>
      </select>

      <button onclick="limpiarFiltros()">Limpiar filtros</button>
    </div>

    <div id="estadoCargaAdmin">Cargando resultados...</div>

    <div class="tabla-scroll">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Paciente</th>
            <th>Test</th>
            <th>Puntaje</th>
            <th>Nivel</th>
            <th>Acción</th>
            <th>PDF</th>
          </tr>
        </thead>
        <tbody id="tablaResultadosAdmin"></tbody>
      </table>
    </div>
  </section>

  <section class="card" id="detalleResultado" style="display:none;">
    <h2>Detalle de evaluación</h2>
    <div id="detalleContenido"></div>
  </section>

</main>

<script type="module" src="auth.js"></script>
<script type="module" src="script-admin-resultados.js"></script>

</body>
</html>
