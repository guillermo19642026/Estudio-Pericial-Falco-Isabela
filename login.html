<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso a Tests Psicométricos | Falco®</title>
<link rel="stylesheet" href="styles.css">
</head>

<body class="login-premium-body">

<div class="login-topbar">
  <a href="index.html" class="login-back">← Volver al inicio</a>
</div>

<div class="login-premium-card">

  <div class="login-logo">
    <img src="img/logo.png" alt="Estudio Pericial Psicológico">
  </div>

 <h1 id="loginTitulo">Acceso</h1>

<p id="loginDescripcion">
  Ingrese sus credenciales para continuar.
</p>



  <div class="login-form">
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">

    <button class="btn-login-premium" onclick="login()">Ingresar</button>

    <p id="error" class="login-error"></p>
  </div>

  <hr class="login-separador">

  <div class="solicitud-box">
    <h2>Solicitar acceso</h2>
   <p class="solicitud-subtitulo">
  Complete sus datos para solicitar acceso a la plataforma de evaluaciones psicométricas.
</p>

    <div class="campo-form">
      <label>Nombre y apellido</label>
      <input type="text" id="sol_nombre" placeholder="Ej: María González">
    </div>


<div class="campo-form">
  <label>DNI</label>
  <input type="text" id="sol_dni" inputmode="numeric" placeholder="Ej: 12345678">
</div>



    <div class="campo-form">
      <label>Profesión / institución</label>
      <input type="text" id="sol_profesion" placeholder="Ej: Psicóloga / Hospital">
    </div>

    <div class="campo-form">
      <label>Email de contacto</label>
      <input type="email" id="sol_email" placeholder="Ej: email@ejemplo.com">
    </div>

    <div class="campo-form">
      <label>Motivo de solicitud</label>
      <textarea id="sol_motivo" placeholder="Indique brevemente el uso previsto"></textarea>
    </div>

    <button type="button" class="btn-access-premium" onclick="solicitarAccesoWhatsapp()">
      Enviar solicitud por WhatsApp
    </button>

    <p id="sol_error" class="login-error"></p>
  </div>

  <p class="login-note">
  Acceso exclusivo con usuario autorizado.
</p>

</div>

<script type="module" src="auth.js"></script>

<script>
function solicitarAccesoWhatsapp() {
  const nombre = document.getElementById("sol_nombre");
  const dni = document.getElementById("sol_dni");
  const profesion = document.getElementById("sol_profesion");
  const email = document.getElementById("sol_email");
  const motivo = document.getElementById("sol_motivo");
  const error = document.getElementById("sol_error");

  const campos = [nombre, dni, profesion, email, motivo];

  campos.forEach(c => c.classList.remove("campo-error"));
  error.textContent = "";

  let hayError = false;

  campos.forEach(campo => {
    if (!campo.value.trim()) {
      campo.classList.add("campo-error");
      hayError = true;
    }
  });

  const emailValido = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim());

  if (email.value.trim() && !emailValido) {
    email.classList.add("campo-error");
    error.textContent = "Ingresá un email válido.";
    return;
  }

  if (hayError) {
    error.textContent = "Completá todos los campos.";
    return;
  }

const mensaje = `Hola, solicito acceso a la plataforma de tests psicométricos Falco®.

Nombre: ${nombre.value}
DNI: ${dni.value}
Profesión: ${profesion.value}
Email: ${email.value}
Motivo: ${motivo.value}
Fecha: ${new Date().toLocaleString()}`;

  const telefono = "5491132049521";
  const url = `https://api.whatsapp.com/send?phone=${telefono}&text=${encodeURIComponent(mensaje)}`;

  window.location.href = url;
}
</script>


<script>
  const params = new URLSearchParams(window.location.search);
  const destino = params.get("destino");

  const titulo = document.getElementById("loginTitulo");
  const descripcion = document.getElementById("loginDescripcion");

  if (destino === "biblioteca") {
    titulo.textContent = "Acceso a Biblioteca Profesional";
    descripcion.textContent =
      "Ingrese con su usuario profesional para acceder a los recursos exclusivos del Centro de Recursos Profesionales.";
  } else if (destino === "periciados") {
    titulo.textContent = "Acceso a Evaluación Psicológica";
    descripcion.textContent =
      "Ingrese para completar los instrumentos de evaluación asignados.";
  } else if (destino === "escuela") {
    titulo.textContent = "Acceso a Escuela para Padres FALCO®";
    descripcion.textContent =
      "Ingrese para continuar con su formación.";
  } else {
    titulo.textContent = "Acceso Profesional";
    descripcion.textContent =
      "Ingrese sus credenciales para continuar.";
  }
</script>



</body>
</html>
